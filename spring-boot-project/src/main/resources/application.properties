# Server configuration
server.port=8080

# MySQL Database configuration
spring.datasource.url=jdbc:mysql://localhost:3306/agent_business_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:rootpassword}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA & Hibernate configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Spring Security JWT Configuration
jwt.secret=9a7263c87e83f2a89326e0e91bc41a9d18fa5e6b12c87f98d41e765f0283e1c9
jwt.expiration=86400000

# Google Gemini API configuration
gemini.api.key=${GEMINI_API_KEY}
